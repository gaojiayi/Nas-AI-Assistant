# 本地测试用 docker-compose 配置
# 用于在本地模拟云托管环境（包含 MySQL 和 PostgreSQL）
version: '3.8'

services:
  # 主应用
  app:
    build: ./nas-ai-assistant-app
    ports:
      - "8123:8123"
    environment:
     # MySQL 配置
      MYSQL_URL: jdbc:mysql://mysql:${MYSQL_PORT}/${MYSQL_DATABASE}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      MYSQL_USERNAME: ${MYSQL_USERNAME:-root}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-root123}
      # PostgreSQL 配置
      POSTGRESQL_URL: jdbc:postgresql://postgres:${POSTGRES_PORT}/${POSTGRES_DB}
      POSTGRESQL_USERNAME: ${POSTGRES_USER:-postgres}
      POSTGRESQL_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
      # AI API Key
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
      # 其他配置
      SEARCH_API_KEY: ${SEARCH_API_KEY}
      TAVILY_SEARCH_API_KEY: ${TAVILY_SEARCH_API_KEY}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-cloud}
    depends_on:
      mysql:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - nas-ai-network

  # 前端应用
  ui:
    build: ./nas-ai-assistant-ui
    ports:
      - "5123:5123"
    volumes:
      - ./nas-ai-assistant-ui/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - nas-ai-network

  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: nas-ai-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-root123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-nas_ai_agent}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./nas-ai-assistant-app/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - nas-ai-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # PostgreSQL 向量数据库
  postgres:
    image: pgvector/pgvector:pg16
    container_name: nas-ai-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
      POSTGRES_DB: ${POSTGRES_DB:-nas_ai_agent}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./nas-ai-assistant-app/src/main/resources/pgvector.sql:/docker-entrypoint-initdb.d/01-init.sql
    networks:
      - nas-ai-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  nas-ai-network:
    driver: bridge

volumes:
  mysql_data:
  postgres_data:

